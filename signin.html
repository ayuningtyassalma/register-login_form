<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="../register&login_form/style.css">
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,400;0,500;1,600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="regis">
        <h3> Sign In </h3>
        <h6> Please fill the column below</h6>
        <form action="">
            <div class="username">
                <p> Username </p>
                <input type="text" name="" placeholder="Enter your username">
            </div>
            <div class="pass">
                <p> Password </p>
                <input type="password" name="" placeholder="Enter your password">
            </div>
        </form>

    </div>
</body>

</html>
