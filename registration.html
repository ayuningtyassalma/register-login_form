<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
    <link rel="stylesheet" href="../register&login_form/style.css">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100;0,400;0,500;1,600&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="regis">
        <h3> Register </h3>
        <h6> Please fill the column below </h6>
        <form action="">
            <div class="input_fname">
                <p> First Name </p>
                <input type="text" name="" placeholder="Enter your First Name">
            </div>
            <div class="input_lname">
                <p> Last Name </p>
                <input type="text" name="" placeholder="Enter your Last Name">
            </div>
            <div class="input_pass">
                <p> Password </p>
                <input type="password" name="" placeholder="Enter your password">
            </div>
            <div class="input_pass2">
                <p> Repeat your password </p>
                <input type="password" name="" placeholder="Enter your password">
            </div>
            <div class="inpus_email">
                <p> Email Address </p>
                <input type="email" name="" placeholder="Enter your email">
            </div>
            <div class="input_phone_number">
                <p> Phone Number </p>
                <input type="text" name="" placeholder="Enter your phone number">
            </div>
        </form>
        <div class="exp">
            <p> Or you can sign up with </p>
        </div>
        <div class="social_icon">
            <a href="https://www.facebook.com/"><img src="../register&login_form/photo/facebook.png" alt=""
                    class="fb_icon"></a>
            <a href="https://mail.google.com"> <img src="../register&login_form/photo/search.png" alt=""
                    class="google_icon"> </a>
        </div>
        <div class="regis_button">
            <form action="">
                <input type="submit" value="Register Now!">
            </form>
        </div>
        <div class="sign_in_button">
            <input type="submit" value="Sign In" id="sign_in">
        </div>
    </div>

</body>

</html>
